version: '3.8'

services:
  minio:
    image: quay.io/minio/minio
    container_name: minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
      - ./config:/root/.minio   
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: deneme123
    command: server /data --console-address ":9001"
    networks:
      - main-net

volumes:
  minio_data:
    external: true

networks:
  main-net:
    external: true
