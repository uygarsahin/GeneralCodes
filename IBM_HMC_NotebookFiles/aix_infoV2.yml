---
- name: Collect and print system data
  hosts: all
  become: true
  gather_facts: false

  vars:
    ansible_user: "{{ ssh_user }}"
    ansible_ssh_pass: "{{ ssh_password }}"

  tasks:

    - name: Run system data collection as a single block
      ansible.builtin.shell: |
        sudo date >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo echo "====================== PV-FS-PATHs-VGs-Lvs ========================="  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo lspv -u >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo df -g >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo lspath  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo lsvg -o  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo lvlstmajor  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo ls -l /dev/*vg*  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo ls -l /dev | grep "\->"  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo lsvg |awk '{print "lsvg -l "$1}'  | ksh >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo lspv -u | awk 'BEGIN{
            "sudo hostname" | getline myhost
            printf "%-30s %-15s %-10s %-14s %-14s %-14s %-12s %-20s %-14s %-40s %-10s\n\n", "Hostname", "Disk", "Paths", "Capacity(GB)", "VG_Name", "Reserve_Policy","Queue_depth", "PVID", "Storage_Type", "Disk_SeriNo", "LUN_Status"
        }{
            "sudo lsattr -El "$1" | grep reserve_policy | cut -d\" \" -f 3" | getline policy
            "sudo lsattr -El "$1" | grep queue_depth | cut -d\" \" -f 6" | getline queue_depth
            "sudo odmget -q \"name="$1" and attribute=unique_id\" CuAt | grep -i value | cut -d\"=\" -f2" | getline diskID
            "sudo lsdev -l "$1" -r description | cut -d\" \" -f1" | getline manufacture
            "sudo lspath -l "$1" | grep -ci enable" | getline numberOfpath
            "sudo bootinfo -s "$1 | getline capacity
            LUN_Status = ($3 == "None" ? "standalone" : ($3 == "altinst_rootvg" ? "standalone" : $4))
            printf "%-30s %-15s %-10s %-14s %-14s %-14s %-12s %-20s %-14s %-40s %-10s\n", myhost, $1, numberOfpath, (capacity / 1024), $3, policy, queue_depth, $2, manufacture, substr(diskID, 3, (length(diskID) - 3)), LUN_Status
        }' >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo echo "========================= HACMP ================================="  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo /usr/es/sbin/cluster/utilities/clRGinfo >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo /usr/es/sbin/cluster/utilities/cllsnode  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo /usr/es/sbin/cluster/utilities/clshowsrv -v  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo echo "======================= ADAPTERs ==================================="  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo ifconfig -a >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo lsdev -Cc adapter  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo lscfg -vpl fcs0  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo lscfg -vpl fcs1  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo echo vfcs | kdb | grep fcs  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo echo "=========================================================="  >> /root/$(hostname)_$(date +"%m_%d_%Y").txt
        sudo ls -l /root/$(hostname)_$(date +"%m_%d_%Y").txt
      register: raw_output
      changed_when: false

    - name: Display pretty structured system info
      ansible.builtin.debug:
        var: raw_output.stdout_lines
